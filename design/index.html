<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lumos — design showcases</title>
<style>
  :root{
    --calm:#30d158; --bg:#050506; --panel:#0d0d10; --line:#1c1c22;
    --txt:#e9e9ea; --dim:#8c8c92;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}
  header{display:flex;align-items:center;gap:18px;padding:13px 22px;
    background:linear-gradient(#101014,#0a0a0d);border-bottom:1px solid var(--line);
    box-shadow:0 8px 24px -12px rgba(0,0,0,.6);
    flex:0 0 auto;position:relative;z-index:1}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;letter-spacing:.2px}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--calm);
    box-shadow:0 0 9px var(--calm)}
  .brand small{color:var(--dim);font-weight:400;font-size:12px;margin-left:2px}
  nav{display:flex;gap:8px;margin-left:8px}
  .tab{background:#16161a;color:#c7c7cc;border:1px solid #26262c;border-radius:9px;
    padding:8px 15px;cursor:pointer;font:inherit;font-size:13px;
    transition:background .15s cubic-bezier(.4,0,.2,1),border-color .15s cubic-bezier(.4,0,.2,1),
      box-shadow .15s cubic-bezier(.4,0,.2,1),color .15s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;line-height:1.3}
  .tab span{color:var(--dim);font-size:11px;margin-top:1px}
  .tab:hover{background:#1e1e24;border-color:#33333a}
  .tab.on{border-color:var(--calm);color:#fff;box-shadow:0 0 0 1px var(--calm) inset}
  .tab.on span{color:#bdeccb}
  .spacer{flex:1}
  .open{color:var(--dim);font-size:12px;text-decoration:none;border:1px solid #26262c;
    padding:7px 12px;border-radius:9px;
    transition:color .15s cubic-bezier(.4,0,.2,1),border-color .15s cubic-bezier(.4,0,.2,1)}
  .open:hover{color:#fff;border-color:#3a3a42}
  .frames{position:relative;flex:1 1 auto;min-height:0}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg);
    opacity:0;pointer-events:none;transition:opacity .22s cubic-bezier(.4,0,.2,1)}
  iframe.on{opacity:1;pointer-events:auto}
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span>Lumos <small>design showcases</small></div>
    <nav id="nav">
      <button class="tab on" data-f="0">Notch &amp; menu <span>the glance + dropdown</span></button>
      <button class="tab" data-f="1">Notifications <span>Context · Timing · Tip</span></button>
      <button class="tab" data-f="2">Non-notch Macs <span>2 finalists</span></button>
      <button class="tab" data-f="3">Interactions <span>glow fade · LED hover</span></button>
      <button class="tab" data-f="4">Stale &amp; Freshness <span>Live · Stale · Refilled · Waiting</span></button>
      <button class="tab" data-f="5">Icon / Mark <span>wand-casting-light concepts</span></button>
    </nav>
    <div class="spacer"></div>
    <a class="open" id="openRaw" href="showcase.html" target="_blank" rel="noopener">Open this one ↗</a>
  </header>
  <div class="frames">
    <iframe class="on" src="showcase.html"    title="Notch & menu"></iframe>
    <iframe            src="notifications.html" title="Notifications"></iframe>
    <iframe            src="non-notch.html"     title="Non-notch Macs"></iframe>
    <iframe            src="interactions.html"  title="Interactions"></iframe>
    <iframe            src="stale-states.html"  title="Stale & Freshness"></iframe>
    <iframe            src="icon.html"          title="Icon / Mark"></iframe>
  </div>
<script>
  const tabs=[...document.querySelectorAll('.tab')],
        frames=[...document.querySelectorAll('iframe')],
        openRaw=document.getElementById('openRaw'),
        files=['showcase.html','notifications.html','non-notch.html','interactions.html','stale-states.html','icon.html'];
  function pick(i){
    tabs.forEach((t,n)=>t.classList.toggle('on',n===i));
    frames.forEach((f,n)=>f.classList.toggle('on',n===i));
    openRaw.href=files[i];
  }
  tabs.forEach((t,i)=>t.onclick=()=>pick(i));
</script>
</body>
</html>
